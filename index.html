.bg-glow {
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 14%, rgba(255,255,255,.65), transparent 20rem),
    radial-gradient(circle at 86% 12%, rgba(216,15,31,.10), transparent 22rem),
    radial-gradient(circle at 45% 96%, rgba(216,15,31,.08), transparent 26rem);
  pointer-events:none;
  z-index:-3;
}
.wrap {
  width:min(1180px, calc(100% - 44px));
  margin:28px auto 40px;
}
.hero {
  position:relative;
  overflow:hidden;
  border-radius:24px;
  padding:34px 38px 28px;
  background:linear-gradient(135deg,#b90512 0%,#df1324 52%,#b70715 100%);
  color:#fff;
  box-shadow:0 18px 50px rgba(154,20,20,.22);
}
.hero:before {
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 78% 20%, rgba(255,219,134,.22), transparent 18rem),
    linear-gradient(130deg, transparent 0 55%, rgba(255,255,255,.08) 55% 61%, transparent 61%);
  pointer-events:none;
}
.title {
  position:relative;
  display:flex;
  gap:22px;
  align-items:center;
}
.badge {
  width:78px;
  height:78px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:radial-gradient(circle,#ffd66e 0%,#ff7b34 36%,#d71920 64%,#9c0610 100%);
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.22), 0 8px 18px rgba(78,0,0,.2);
  font-size:38px;
}
.title h1 {
  margin:0;
  font-size:clamp(34px,5vw,58px);
  line-height:1.05;
  font-weight:900;
  letter-spacing:.05em;
  text-shadow:0 3px 0 rgba(87,0,0,.25);
}
.subtitle {
  margin:12px 0 0;
  font-size:16px;
  line-height:1.7;
  opacity:.96;
}
.stats {
  position:relative;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-top:24px;
}
.stat {
  display:flex;
  align-items:center;
  gap:16px;
  background:rgba(255,255,255,.96);
  color:#a20814;
  border-radius:18px;
  padding:18px 20px;
  box-shadow:0 10px 24px rgba(80,0,0,.12);
  border:1px solid rgba(255,255,255,.75);
}
.icon {
  width:54px;
  height:54px;
  border-radius:14px;
  display:grid;
  place-items:center;
  color:white;
  font-size:26px;
  background:linear-gradient(135deg,#e5091c,#ff6a45);
}
.stat:nth-child(3) .icon { background:linear-gradient(135deg,#ef7d22,#ffbd48); }
.stat:nth-child(4) .icon { background:linear-gradient(135deg,#f5aa26,#ffe082); }
.stat b {
  font-size:34px;
  display:block;
  line-height:1;
}
.stat span {
  font-size:15px;
  color:#5b3732;
  font-weight:700;
}
.panel {
  margin-top:20px;
  background:rgba(255,255,255,.90);
  border:1px solid rgba(238,190,178,.85);
  box-shadow:0 16px 42px rgba(142,57,38,.12);
  border-radius:20px;
  padding:20px 24px;
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:18px;
  align-items:center;
  backdrop-filter:blur(10px);
}
.field {
  display:flex;
  align-items:center;
  gap:12px;
  color:#8b211f;
  font-weight:800;
}
.field label { white-space:nowrap; }
.field i { font-style:normal;color:#d71920; }
select {
  width:100%;
  min-width:260px;
  padding:13px 15px;
  border-radius:12px;
  border:1px solid #efc9c0;
  background:#fff;
  color:#3b241f;
  font-size:15px;
  outline:none;
}
.check {
  display:flex;
  align-items:center;
  gap:10px;
  color:#6f4039;
  font-weight:800;
  white-space:nowrap;
}
.check input {
  width:18px;
  height:18px;
  accent-color:#d71920;
}
.quiz {
  margin-top:22px;
  background:rgba(255,255,255,.94);
  border-radius:22px;
  border:1px solid var(--line);
  box-shadow:0 18px 48px rgba(142,57,38,.12);
  overflow:hidden;
  backdrop-filter:blur(8px);
}
.quizTop {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:18px 26px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,#fff8f3,#fff);
}
.quizLabel {
  display:flex;
  align-items:center;
  gap:10px;
  color:#d71920;
  font-size:20px;
  font-weight:900;
}
.keys {
  background:#fff1eb;
  color:#8d4a3f;
  border-radius:999px;
  padding:8px 15px;
  font-weight:700;
}
.main {
  padding:28px 32px 32px;

const state = {
  current: null,
  revealed: false,
  seenIds: new Set(),
  filtered: QUESTIONS
};

const $ = (id) => document.getElementById(id);

function uniqueChapters() {
  return [...new Set(QUESTIONS.map(q => q.chapter))];
}

function setupChapterSelect() {
  const select = $("chapterSelect");
  select.innerHTML = "";
  const all = document.createElement("option");
  all.value = "__ALL__";
  all.textContent = "全部章节";
  select.appendChild(all);

  uniqueChapters().forEach(chapter => {
    const opt = document.createElement("option");
    opt.value = chapter;
    opt.textContent = chapter;
    select.appendChild(opt);
  });
}

function applyFilter() {
  const chapter = $("chapterSelect").value;
  state.filtered = chapter === "__ALL__" ? QUESTIONS : QUESTIONS.filter(q => q.chapter === chapter);
  state.seenIds.clear();
  updateStats();
  drawRandomQuestion();
}

function makeId(q) {
  return `${q.chapter}::${q.qNum}::${q.question}`;
}

function updateStats() {
  $("totalCount").textContent = QUESTIONS.length;
  $("filteredCount").textContent = state.filtered.length;
  $("seenCount").textContent = state.seenIds.size;
  const left = Math.max(0, state.filtered.length - state.seenIds.size);
  $("leftCount").textContent = left;
}

function sampleQuestion() {
  if (!state.filtered.length) return null;

  const noRepeat = $("noRepeat").checked;
  let pool = state.filtered;

  if (noRepeat) {
    pool = state.filtered.filter(q => !state.seenIds.has(makeId(q)));
    if (!pool.length) {
      state.seenIds.clear();
      pool = state.filtered;
    }
  }

  const idx = Math.floor(Math.random() * pool.length);
  const q = pool[idx];
  state.seenIds.add(makeId(q));
  return q;
}

function drawRandomQuestion() {
  const q = sampleQuestion();
  state.current = q;
  state.revealed = false;

  $("answerBox").classList.remove("show");
  $("showBtn").innerHTML = "☉ 显示答案";

  if (!q) {
    $("questionText").textContent = "当前筛选范围内没有题目。";
    $("questionIndex").textContent = "无题目";
    return;
  }

  $("questionText").textContent = q.question;
  $("questionIndex").textContent = "随机题目";
  renderAnswer(q);
  updateStats();
}

function renderTextBlock(container, items, className, title) {
  container.innerHTML = "";
  if (!items || !items.length) return;
  items.forEach(text => {
    const div = document.createElement("div");
    div.className = className;
    div.textContent = title ? `${title}：${text}` : text;
    container.appendChild(div);
  });
}

function renderAnswer(q) {
  $("sourceText").textContent = `${q.chapter} · 第 ${q.qNum} 题`;
  renderTextBlock($("keywordBox"), q.keywords, "keywords", "关键词");
  renderTextBlock($("prefaceBox"), q.preface, "preface", "");

  const list = $("answerList");
  list.innerHTML = "";
  q.answers.forEach(answer => {
    const li = document.createElement("li");
    li.textContent = answer;
    list.appendChild(li);
  });

  renderTextBlock($("noteBox"), q.notes, "notes", "");
}

function toggleAnswer() {
  if (!state.current) return;
  state.revealed = !state.revealed;
  $("answerBox").classList.toggle("show", state.revealed);
  $("showBtn").innerHTML = state.revealed ? "◉ 隐藏答案" : "☉ 显示答案";
  if (state.revealed) {
    $("answerBox").scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

function showToast(msg) {
  const toast = $("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1100);
}

async function copyCurrentAnswer() {
  const q = state.current;
  if (!q) return;
  const lines = [
    `${q.chapter} · 第 ${q.qNum} 题`,
    q.question,
    "",
    ...(q.keywords || []).map(k => `【关键词】${k}`),
    ...(q.preface || []),
    ...(q.answers || []),
    ...(q.notes || []),
  ];
  const text = lines.filter(Boolean).join("\n");
  try {
    await navigator.clipboard.writeText(text);
    showToast("已复制本题答案");
  } catch (e) {
    showToast("复制失败，请手动复制");
  }
}

function init() {
  setupChapterSelect();
  updateStats();
  drawRandomQuestion();

  $("showBtn").addEventListener("click", toggleAnswer);
  $("nextBtn").addEventListener("click", drawRandomQuestion);
  $("copyBtn").addEventListener("click", copyCurrentAnswer);
  $("resetBtn").addEventListener("click", () => {
    state.seenIds.clear();
    updateStats();
    drawRandomQuestion();
  });
  $("chapterSelect").addEventListener("change", applyFilter);
  $("noRepeat").addEventListener("change", () => {
    state.seenIds.clear();
    updateStats();
  });

  document.addEventListener("keydown", (e) => {
    const tag = (document.activeElement && document.activeElement.tagName || "").toLowerCase();
    if (tag === "select" || tag === "input" || tag === "textarea" || tag === "button") return;
    if (e.code === "Space") {
      e.preventDefault();
      toggleAnswer();
    }
    if (e.key && e.key.toLowerCase() === "n") {
      drawRandomQuestion();
    }
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
