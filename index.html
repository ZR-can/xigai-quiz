<script>
var DATA=JSON.parse(document.getElementById('data').textContent);var cur=null;var shown=false;var seen=new Set();var filtered=DATA;var $=function(id){return document.getElementById(id)};function uid(q){return q.c+'::'+q.n+'::'+q.q}function chapters(){return Array.from(new Set(DATA.map(function(q){return q.c})))}function stats(){$('total').textContent=DATA.length;$('filtered').textContent=filtered.length;$('seen').textContent=seen.size;$('left').textContent=Math.max(0,filtered.length-seen.size)}function fillChapters(){var s=$('chapter');s.innerHTML='<option value="ALL">全部章节</option>';chapters().forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;s.appendChild(o)})}function pick(){var pool=filtered;if($('norepeat').checked){pool=filtered.filter(function(q){return !seen.has(uid(q))});if(pool.length===0){seen.clear();pool=filtered}}var q=pool[Math.floor(Math.random()*pool.length)];seen.add(uid(q));return q}function block(id,arr,cls,prefix){var el=$(id);el.innerHTML='';(arr||[]).forEach(function(t){var d=document.createElement('div');d.className=cls;d.textContent=prefix?prefix+'：'+t:t;el.appendChild(d)})}function render(q){$('source').textContent=q.c+' · 第 '+q.n+' 题';block('keywords',q.k,'kw','关键词');block('notes',q.note,'note','');var ol=$('answerList');ol.innerHTML='';q.a.forEach(function(t){var li=document.createElement('li');li.textContent=t;ol.appendChild(li)})}function nextQuestion(){cur=pick();shown=false;$('answer').classList.remove('show');$('show').textContent='显示答案';$('question').textContent=cur.q;$('index').textContent='随机题目';render(cur);stats()}function toggleAnswer(){shown=!shown;$('answer').classList.toggle('show',shown);$('show').textContent=shown?'隐藏答案':'显示答案'}function copyAnswer(){if(!cur)return;var nl=String.fromCharCode(10);var lines=[cur.c+' · 第 '+cur.n+' 题',cur.q,''].concat((cur.k||[]).map(function(x){return '【关键词】'+x})).concat(cur.a||[]).concat(cur.note||[]);navigator.clipboard.writeText(lines.join(nl)).then(function(){var old=$('copy').textContent;$('copy').textContent='已复制';setTimeout(function(){$('copy').textContent=old},900)}).catch(function(){alert('复制失败，可手动复制答案。')})}function init(){fillChapters();$('show').addEventListener('click',toggleAnswer);$('next').addEventListener('click',nextQuestion);$('copy').addEventListener('click',copyAnswer);$('reset').addEventListener('click',function(){seen.clear();stats();nextQuestion()});$('chapter').addEventListener('change',function(){filtered=this.value==='ALL'?DATA:DATA.filter(function(q){return q.c===event.target.value});seen.clear();nextQuestion()});$('norepeat').addEventListener('change',function(){seen.clear();stats()});document.addEventListener('keydown',function(e){var tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();if(['select','input','textarea'].indexOf(tag)>=0)return;if(e.code==='Space'){e.preventDefault();toggleAnswer()}if(e.key&&e.key.toLowerCase()==='n')nextQuestion()});stats();nextQuestion()}init();
</script>
